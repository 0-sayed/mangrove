name: Auto Assign PR

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  issues: write
  # GitHub requires PR write permission when assigning a pull request via the Issues API.
  pull-requests: write

jobs:
  assign-author:
    name: Assign PR Author
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            if (!pullRequest || pullRequest.draft) {
              return;
            }
            if (pullRequest.assignees.some((assignee) => assignee.login === pullRequest.user.login)) {
              return;
            }
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                assignees: [pullRequest.user.login]
              });
            } catch (error) {
              if (error.status === 403 && error.message === "Resource not accessible by integration") {
                core.warning(`Could not assign PR author with GITHUB_TOKEN: ${error.message}`);
                return;
              }
              throw error;
            }
